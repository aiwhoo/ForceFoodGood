<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Mocha Tests</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="https://unpkg.com/mocha/mocha.css" />

    <!-- Existing models -->
    <script src="../core/models/restaurantModel.js"></script>
    <script src="../core/models/ratings/ratingsModel.js"></script>
    <script src="../core/models/ratings/restaurantRatingsModel.js"></script>
    <script src="../core/models/ratings/menuItemRatingsModel.js"></script>
    <script src="../core/models/ratings/deliveryDriverRatingsModel.js"></script>
    <script src="../core/models/orderModel.js"></script>
    <script src="../core/models/ratingsModel.js"></script>
    <script src="../core/models/orders/OrderModel.js"></script>
    <script src="../core/models/menuItemModel.js"></script>
    <script src="../core/models/users/userModel.js"></script>
    <script src="../core/models/users/CustomerUserModel.js"></script>
    <script src="../core/models/users/RestaurantUserModel.js"></script>

    <!-- Your payment models -->
    <script src="../core/models/PaymentModel.js"></script>
    <script src="../core/models/creditCard.js"></script>
    <script src="../core/models/payPal.js"></script>
    <script src="../core/models/giftCard.js"></script>

</head>

<body>

<div id="mocha"></div>

<script src="https://unpkg.com/chai@4/chai.js"></script>
<script src="https://unpkg.com/mocha/mocha.js"></script>

<script class="mocha-init">

    mocha.setup("bdd");
    const expect = chai.expect;

    /* ---------------- Existing Tests ---------------- */

    describe("Restaurant Rating System", function () {

        it("starts with zero ratings", function () {
            let restaurant1 = new RestaurantModel("Anish's Cat Cafe", "101 North Dupont Road");
            expect(restaurant1.reviews.length).to.equal(0);
        });

        it("average of no reviews is No Reviews Found", function() {
            let restaurant1 = new RestaurantModel("Anish's Cat Cafe", "101 North Dupont Road");
            expect(restaurant1.calculateAverageReviewRating()).to.equal("No Reviews Found");
        });

        it("average review calculation works", function() {
            let restaurant1 = new RestaurantModel("Anish's Cat Cafe", "101 North Dupont Road");
            let review1 = new RatingModel(4, "Matt", "Today", "hello world");
            restaurant1.addReview(review1);
            expect(restaurant1.calculateAverageReviewRating()).to.equal(4);
        });

    });


    describe("Order System", function () {

        it ("cost assert", function () {

            let order1 = new OrderModel(
                "John",
                "123 ave",
                new RestaurantModel("Anish's Cat Cafe", "101 North Dupont Road"),
                1)

            order1.addMenuItem(new MenuItemModel("pizza", 5, "none","idk"))
            order1.addMenuItem(new MenuItemModel("pasta", 7, "none","idk"))

            expect(order1.getCost()).to.equal(12);

        });

    });


    describe("User Model Test", function(){

        it("exhibits firstname last name", function(){

            let customer1 = new CustomerUserModel("customer1", "David");

            expect(customer1.getFirstName()).to.equal("David");

            let users = [
                new CustomerUserModel("Customer 2", "David"),
                new UserModel("User 3", "Kai"),
                new RestaurantUserModel("RO 2", "Aditya"),
                new RestaurantUserModel("Restaurant", "Manu")
            ];

            let expectedValues = ["David", "Kai", "Aditya", "Manu"];

            for(let i = 0; i < users.length; i++) {

                let user = users[i];
                let expectedValue = expectedValues[i];

                expect(user.getFirstName()).to.equal(expectedValue);

            }

        });

        it("logs in user", function(){

            let customer2 = new CustomerUserModel("Customer 2", "Tushar", "C", "tushar@udel.edu");
            let user1 = new UserModel("User 1", "Anish", "C", "anish@udel.edu");
            let restaurantOwner = new RestaurantUserModel("User Owner 1", "Manu");

            expect(customer2.login("anish@udel.edu")).to.equal(false);
            expect(customer2.login("tushar@udel.edu")).to.equal(true);
            expect(user1.login("anish@udel.edu")).to.equal(true);
            expect(user1.login("tushar@udel.edu")).to.equal(false);
            expect(restaurantOwner.login("manu@udel.edu")).to.equal(true);

        });

    });


    /* ---------------- Payment Method Tests (16 tests) ---------------- */

    describe("Payment Method Polymorphism", function () {

        it("PaymentModel validates correct amount", () => {
            let payment = new PaymentModel(50);
            expect(payment.validate()).to.equal(true);
        });

        it("PaymentModel rejects negative amount", () => {
            let payment = new PaymentModel(-10);
            expect(payment.validate()).to.equal(false);
        });

        it("PaymentModel rejects zero amount", () => {
            let payment = new PaymentModel(0);
            expect(payment.validate()).to.equal(false);
        });

        it("CreditCard validates correct card number", () => {
            let card = new CreditCard(20, "1234567812345678");
            expect(card.validate()).to.equal(true);
        });

        it("CreditCard rejects invalid card number", () => {
            let card = new CreditCard(20, "123");
            expect(card.validate()).to.equal(false);
        });

        it("CreditCard rejects invalid amount", () => {
            let card = new CreditCard(-5, "1234567812345678");
            expect(card.validate()).to.equal(false);
        });

        it("CreditCard processPayment works", () => {
            let card = new CreditCard(30, "1234567812345678");
            expect(card.processPayment()).to.equal("Processed $30 using Credit Card");
        });

        it("PayPal validates correct email", () => {
            let paypal = new PayPal(40, "user@email.com");
            expect(paypal.validate()).to.equal(true);
        });

        it("PayPal rejects invalid email", () => {
            let paypal = new PayPal(40, "invalidemail");
            expect(paypal.validate()).to.equal(false);
        });

        it("PayPal rejects invalid amount", () => {
            let paypal = new PayPal(-5, "user@email.com");
            expect(paypal.validate()).to.equal(false);
        });

        it("PayPal processPayment works", () => {
            let paypal = new PayPal(40, "user@email.com");
            expect(paypal.processPayment()).to.equal("Processed $40 using PayPal");
        });

        it("GiftCard validates sufficient balance", () => {
            let gift = new GiftCard(25, 100);
            expect(gift.validate()).to.equal(true);
        });

        it("GiftCard rejects insufficient balance", () => {
            let gift = new GiftCard(100, 20);
            expect(gift.validate()).to.equal(false);
        });

        it("GiftCard rejects invalid amount", () => {
            let gift = new GiftCard(-10, 50);
            expect(gift.validate()).to.equal(false);
        });

        it("GiftCard processPayment works", () => {
            let gift = new GiftCard(20, 100);
            expect(gift.processPayment()).to.equal("Processed $20 using Gift Card");
        });

        it("Polymorphism works across payment types", () => {

            let payments = [
                new CreditCard(10, "1234567812345678"),
                new PayPal(10, "user@email.com"),
                new GiftCard(10, 50)
            ];

            payments.forEach(p => {
                expect(p.processPayment()).to.be.a("string");
            });

        });

    });

</script>


<script src="ratingsModelTestAndy.js"></script>
<script src="ratingHierachy.test.js"></script>
<script src="test.array.js"></script>
<script src="test.object.js"></script>

<script class="mocha-exec">
    mocha.run();
</script>

</body>
</html>
