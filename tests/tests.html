<script class="mocha-init">
    mocha.setup("bdd");
    const expect = chai.expect;
    describe("Restaurant Rating System", function () {
        it("starts with zero ratings", function () {
            let restaurant1 = new RestaurantModel("Anish's Cat Cafe", "101 North Dupont Road");
            expect(restaurant1.reviews.length).to.equal(0);
        })
        it("average of no reviews is No Reviews Found", function() {
            let restaurant1 = new RestaurantModel("Anish's Cat Cafe", "101 North Dupont Road");
            expect(restaurant1.calculateAverageReviewRating()).to.equal("No Reviews Found");
        })
        it("average of no reviews is No Reviews Found", function() {
            let restaurant1 = new RestaurantModel("Anish's Cat Cafe", "101 North Dupont Road");
            let review1 = new RatingModel(4, "Matt", "Today", "hello world");
            restaurant1.addReview(review1);
            expect(restaurant1.calculateAverageReviewRating()).to.equal(4);
        })
    })
    describe("Order System", function () {
        it ("cost assert", function () {

            let order1 = new OrderModel(
                "John",
                "123 ave",
                new RestaurantModel("Anish's Cat Cafe", "101 North Dupont Road"),
                1)
            order1.addMenuItem(new MenuItemModel("pizza", 5, "none","idk"))
            order1.addMenuItem(new MenuItemModel("pasta", 7, "none","idk"))
            console.log('price:', order1.getCost());
            expect(order1.getCost()).to.equal(12);
        })

    })
    describe("User Model Test", function(){
        it("exhibits firstname last name", function(){
            let customer1 = new CustomerUserModel("cus5.tomerId5", "David");
            //let customer2 = new CustomerUserModel();
            expect(customer1.getFirstName()).to.equal("David");
        })
    })
    describe("RestaurantModel Test Kai", function () {
        it("should correctly initialize name, address, and operatingHours during instantiation", function () {
            let restaurant = new RestaurantModel("Anish's Cat Cafe", "123 Main St", "9am-10pm");
            expect(restaurant.getName()).to.equal("Anish's Cat Cafe");
            expect(restaurant.getAddress()).to.equal("123 Main St");
            expect(restaurant.getOperatingHours()).to.equal("9am-10pm");
        });
        it("should update the operatingHours state when setOperatingHours is called", function () {
            let restaurant = new RestaurantModel("Anish's Cat Cafe", "123 Main St", "TBD");
            restaurant.setOperatingHours("24/7");
            expect(restaurant.getOperatingHours()).to.equal("24/7");
        });
        it("should not allow setting an empty string as the restaurant name", function () {
            let restaurant = new RestaurantModel("Original Name", "123 Main St");
            restaurant.setName("");
            expect(restaurant.getName()).to.equal("Original Name");
        });
        it("should return exactly 'No Reviews Found' when length is 0", function () {
            let restaurant = new RestaurantModel("Fresh Cafe", "456 Road");
            let result = restaurant.calculateAverageReviewRating();
            expect(result).to.be.a('string');
            expect(result).to.equal("No Reviews Found");
        });
    });
