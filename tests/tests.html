<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Mocha Tests</title>

    <link rel="stylesheet" href="https://unpkg.com/mocha/mocha.css" />

    <!-- Load the model -->
    <script src="../core/models/menuItemModel.js"></script>

</head>

<body>

<div id="mocha"></div>

<script src="https://unpkg.com/chai@4/chai.js"></script>
<script src="https://unpkg.com/mocha/mocha.js"></script>

<script>

    mocha.setup("bdd");
    const expect = chai.expect;

    /* ---------------- MenuItemModel Tests ---------------- */

    describe("MenuItemModel Tests", function () {

        // 1️⃣ Happy Path
        it("constructor correctly sets and returns price", function () {

            let item = new MenuItemModel("Burger", 9.99, "Tasty burger", "Mains");

            expect(item.getPrice()).to.equal(9.99);

        });


        // 2️⃣ Edge Case
        it("string price remains a string (shows missing validation risk)", function () {

            let item = new MenuItemModel("BadPrice", "9.99", "Oops", "Mains");

            expect(item.getPrice()).to.equal("9.99");
            expect(item.getPrice()).to.be.a("string");

        });


        // 3️⃣ Invalid Input / Risk Case
        it("negative price is accepted (shows missing validation risk)", function () {

            let item = new MenuItemModel("Bad Item", -1, "desc", "Mains");

            expect(item.getPrice()).to.equal(-1);

        });


        // 4️⃣ State / Behavior Validation
        it("getPrice reflects updated price when property changes", function () {

            let item = new MenuItemModel("Pizza", 12, "Cheesy", "Mains");

            item.price = 15;

            expect(item.getPrice()).to.equal(15);

        });

    });

    mocha.run();

</script>

</body>

</html>
