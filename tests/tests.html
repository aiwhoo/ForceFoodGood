<script class="mocha-init">
    mocha.setup("bdd");
    const expect = chai.expect;
    describe("Restaurant Rating System", function () {
        it("starts with zero ratings", function () {
            let restaurant1 = new RestaurantModel("Anish's Cat Cafe", "101 North Dupont Road");
            expect(restaurant1.reviews.length).to.equal(0);
        })
        it("average of no reviews is No Reviews Found", function () {
            let restaurant1 = new RestaurantModel("Anish's Cat Cafe", "101 North Dupont Road");
            expect(restaurant1.calculateAverageReviewRating()).to.equal("No Reviews Found");
        })
        it("average of no reviews is No Reviews Found", function () {
            let restaurant1 = new RestaurantModel("Anish's Cat Cafe", "101 North Dupont Road");
            let review1 = new RatingModel(4, "Matt", "Today", "hello world");
            restaurant1.addReview(review1);
            expect(restaurant1.calculateAverageReviewRating()).to.equal(4);
        })
    })
    describe("Order System", function () {
        let pizzaItem = new MenuItemModel("pizza", 5, "none", "idk")
        let pastaItem = new MenuItemModel("pasta", 7, "none", "idk")
        let waterItem = new MenuItemModel("water", 1.001, "none", "idk")
        let potatoItem = new MenuItemModel("potato", 3, "none", "idk")

        it("updatingCost & totalItems (happy path)", function () {
            let order1 = new OrderModel(
                "John",
                "123 ave",
                new RestaurantModel("Anish's Cat Cafe",
                    "101 North Dupont Road"),
                1)
            order1.addMenuItem(pizzaItem);
            order1.addMenuItem(pastaItem);
            console.log('price before removal:', order1.getCost());
            expect(order1.getCost()).to.equal(12);
            order1.removeMenuItem(pastaItem);
            console.log('price after removal:', order1.getCost());
            expect(order1.getCost()).to.equal(5);
        })
        it("addMenuItem w/ small decimal price (edge case)", function () {
            let order2 = new OrderModel(
                "Harold",
                "422 ave",
                new RestaurantModel("Anish's Cat Cafe",
                    "101 North Dupont Road"),
                2)
            // would want 1.001 to round to 1.00
            order2.addMenuItem(waterItem)
            expect(order2.getCost()).to.equal(1.00);
        })
        it("removeMenuItem where menuItem doesn't exist in order (invalid input)", function () {
            let order3 = new OrderModel(
                "Oswald",
                "243 ave",
                new RestaurantModel("Anish's Cat Cafe",
                    "101 North Dupont Road"),
                3)
            order3.removeMenuItem(potatoItem)
            expect(order3.getCost()).to.equal(-3);
        })
        it("totalItems changes when a new item is added or one is removed (state change)", function () {
            let order4 = new OrderModel(
                "Jenny",
                "784 ave",
                new RestaurantModel("Anish's Cat Cafe",
                    "101 North Dupont Road"),
                4)
            expect(order4.getTotalItems()).to.equal(0);
            order4.addMenuItem(pizzaItem);
            order4.addMenuItem(potatoItem);
            expect(order4.getTotalItems()).to.equal(2);
            order4.removeMenuItem(potatoItem)
            expect(order4.getTotalItems()).to.equal(1);
        })


    })
    describe("User Model Test", function () {
        it("exhibits firstname last name", function () {
            let customer1 = new CustomerUserModel("cus5.tomerId5", "David");
            //let customer2 = new CustomerUserModel();
            expect(customer1.getFirstName()).to.equal("David");
        })
    })
