<!DOCTYPE html>
<html>

<head>

<title>Payment Method Demo</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-5">

<h2>Payment Method Demo</h2>

<label>Payment Type</label>

<select id="type" class="form-select mb-3">

    <option value="credit">Credit Card</option>
    <option value="paypal">PayPal</option>
    <option value="gift">Gift Card</option>

</select>


<label>Amount</label>

<input id="amount" class="form-control mb-3" placeholder="Enter amount">


    <button class="btn btn-primary" onclick="runPayment()">Process Payment</button>


    <h4 class="mt-3">Result:</h4>

    <p id="result"></p>


    <script type="module">

        import CreditCard from "./CreditCard.js";
        import PayPal from "./PayPal.js";
        import GiftCard from "./GiftCard.js";

        window.runPayment = function () {

        const type = document.getElementById("type").value;
        const amount = Number(document.getElementById("amount").value);

        let payment;

        if (type === "credit") {
        payment = new CreditCard(amount, "1234567812345678");
    }

        if (type === "paypal") {
        payment = new PayPal(amount, "user@email.com");
    }

        if (type === "gift") {
        payment = new GiftCard(amount, 100);
    }

        try {

        payment.validate();

        const result = payment.processPayment();

        document.getElementById("result").innerText = result;

    } catch (error) {

        document.getElementById("result").innerText = error.message;

    }

    };

    </script>

</body>

</html>
