<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Mocha Tests - Cart Model</title>
    <link rel="stylesheet" href="https://unpkg.com/mocha/mocha.css" />
</head>
<body>
    <div id="mocha"></div>

    <script src="https://unpkg.com/chai@4/chai.js"></script>
    <script src="https://unpkg.com/mocha/mocha.js"></script>

    <script>
        class Cart {
            constructor() {
                this.items = [];
            }

            addItem(name, price, quantity = 1) {
                const existingItem = this.items.find(item => item.name === name);
                if (existingItem) {
                    existingItem.quantity += quantity;
                } else {
                    this.items.push({ name, price, quantity });
                }
            }

            calculateTotal() {
                let total = 0;
                for (let item of this.items) {
                    total += item.price * item.quantity;
                }
                return total.toFixed(2);
            }

            checkout() {
                this.items = [];
            }
        }

        function checkoutProcess(cart) {
            if (cart.items.length === 0) {
                throw new Error("Cannot checkout with an empty cart.");
            }
            cart.items = []; 
        }
    </script>

    <script>
        mocha.setup("bdd");
        const expect = chai.expect;

        describe("Cart Model Tests", function () {
            let cart;

            beforeEach(function () {
                cart = new Cart();
            });

            // TEST 1: HAPPY PATH
            it("should add a new item and calculate the total correctly", function () {
                cart.addItem('Burger', 10.50, 2);
                expect(cart.items.length).to.equal(1);
                expect(cart.calculateTotal()).to.equal('21.00');
            });

            // TEST 2: STATE CHANGE
            it("should update quantity and state when adding an existing item", function () {
                cart.addItem('Fries', 5, 1);
                cart.addItem('Fries', 5, 2);
                expect(cart.items.length).to.equal(1);
                expect(cart.items[0].quantity).to.equal(3);
            });

            // TEST 3: EDGE CASE
            it("should throw an error when checking out an empty cart", function () {
                expect(() => checkoutProcess(cart)).to.throw("Cannot checkout with an empty cart.");
            });

            // TEST 4: INVALID INPUT
            it("should not allow negative quantities to result in a negative total", function () {
                cart.addItem('Soda', 2.00, -5);
                const total = parseFloat(cart.calculateTotal());
                // Even with bad input, the business logic shouldn't result in us owing the customer money
                expect(total).to.be.at.least(0);
            });

            // EXTRA VALIDATION (BEHAVIOR)
            it("should clear all items after a successful internal checkout", function () {
                cart.addItem('Burger', 10, 1);
                cart.checkout();
                expect(cart.items.length).to.equal(0);
            });
        });

        mocha.run();
    </script>
</body>
</html>
