<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Mocha Tests - Cart Model</title>
    <link rel="stylesheet" href="https://unpkg.com/mocha/mocha.css" />
</head>
<body>
    <div id="mocha"></div>

    <script src="https://unpkg.com/chai@4/chai.js"></script>
    <script src="https://unpkg.com/mocha/mocha.js"></script>

    <script>
        class Cart {
            constructor() {
                this.items = [];
            }

            addItem(name, price, quantity = 1) {
                const existingItem = this.items.find(item => item.name === name);
                if (existingItem) {
                    existingItem.quantity += quantity;
                } else {
                    this.items.push({ name, price, quantity });
                }
            }

            calculateTotal() {
                let total = 0;
                for (let item of this.items) {
                    total += item.price * item.quantity;
                }
                return total.toFixed(2);
            }

            checkout() {
                this.items = [];
            }
        }

        // Global checkout function (as per your original code)
        function checkoutProcess(cart) {
            if (cart.items.length === 0) {
                throw new Error("Cannot checkout with an empty cart.");
            }
            const orderSuccessful = true;
            if (orderSuccessful) {
                cart.items = [];
            }
        }
    </script>

    <script>
        mocha.setup("bdd");
        const expect = chai.expect;

        describe("Cart Model Tests", function () {
            let cart;

            beforeEach(function () {
                cart = new Cart(); // Now Cart is globally defined
            });

            it("adds a new item correctly", function () {
                cart.addItem('Burger', 10, 2);
                expect(cart.items.length).to.equal(1);
                expect(cart.items[0].name).to.equal('Burger');
                expect(cart.items[0].price).to.equal(10);
                expect(cart.items[0].quantity).to.equal(2);
            });

            it("updates quantity when adding an existing item", function () {
                cart.addItem('Burger', 10, 1);
                cart.addItem('Burger', 10, 3);
                expect(cart.items.length).to.equal(1);
                expect(cart.items[0].quantity).to.equal(4);
            });

            it("calculates total correctly", function () {
                cart.addItem('Burger', 10, 2);
                cart.addItem('Fries', 5, 1);
                expect(cart.calculateTotal()).to.equal('25.00');
            });

            it("clears all items after checkout", function () {
                cart.addItem('Burger', 10, 1);
                cart.addItem('Fries', 5, 1);
                cart.checkout();
                expect(cart.items.length).to.equal(0);
            });

            it("should throw an error when checking out an empty cart using checkoutProcess", function () {
                expect(() => checkoutProcess(cart)).to.throw("Cannot checkout with an empty cart.");
            });
        });

        // Run the tests
        mocha.run();
    </script>
</body>
</html>
