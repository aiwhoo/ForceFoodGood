<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Cart Model Mocha Tests</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://unpkg.com/mocha/mocha.css" />
</head>

<body>

<div id="mocha"></div>

<script src="https://unpkg.com/chai@4/chai.js"></script>
<script src="https://unpkg.com/mocha/mocha.js"></script>

<script type="module">

mocha.setup("bdd");
var expect = chai.expect;

import Cart, { checkout } from "../core/models/cartModel.js";

describe("Cart Model", function () {

  it("Happy path: addItem adds a new item correctly", function () {
    var cart = new Cart();

    cart.addItem("Burger", 5.0, 2);

    expect(cart.items.length).to.equal(1);
    expect(cart.items[0].name).to.equal("Burger");
    expect(cart.items[0].price).to.equal(5.0);
    expect(cart.items[0].quantity).to.equal(2);
  });

  it("Edge case: addItem defaults quantity to 1 if not provided", function () {
    var cart = new Cart();

    cart.addItem("Fries", 3.5);

    expect(cart.items.length).to.equal(1);
    expect(cart.items[0].quantity).to.equal(1);
  });

  it("Failure case: checkout(cart) throws error when cart is empty", function () {
    var cart = new Cart();

    expect(function () {
      checkout(cart);
    }).to.throw("Cannot checkout with an empty cart.");
  });

  it("State change: checkout() clears cart after items added", function () {
    var cart = new Cart();

    cart.addItem("Burger", 5.0, 2);
    cart.addItem("Fries", 3.5, 1);

    cart.checkout();

    expect(cart.items.length).to.equal(0);
  });

});

mocha.run();

</script>

</body>
</html>
