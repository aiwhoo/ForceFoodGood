<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | ForceFoodGood</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="h-screen flex items-center justify-center">

<div class="container max-w-md">
    <div class="card shadow-xl border-0 rounded-lg p-4 bg-white">
        <div class="text-center mb-4">
            <div class="mascot-logo mb-2">🖩</div>
            <h2 class="text-navy font-bold text-2xl">Join ForceFoodGood</h2>
            <p class="text-gray-500">Calculate your cravings today!</p>
        </div>

        <form id="registrationForm">
            <div class="mb-3">
                <label class="form-label font-semibold text-navy">First Name</label>
                <input type="text" class="form-control" id="firstName" required>
            </div>
            <div class="mb-3">
                <label class="form-label font-semibold text-navy">Last Name</label>
                <input type="text" class="form-control" id="lastName" required>
            </div>
            <div class="mb-3">
                <label class="form-label font-semibold text-navy">Email Address</label>
                <input type="email" class="form-control" id="email" required>
            </div>
            <div class="mb-4">
                <label class="form-label font-semibold text-navy">Account Type</label>
                <select class="form-select" id="userType">
                    <option value="customer">Hungry Customer</option>
                    <option value="restaurant">Restaurant Partner</option>
                </select>
            </div>
            <button type="submit" class="btn btn-navy w-100 py-2 font-bold shadow-sm">Register</button>
        </form>
    </div>
</div>

</body>
</html>
