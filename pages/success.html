<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Successful</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f5f7fb;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .success-container {
        background: white;
        width: 350px;
        padding: 40px 30px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        text-align: center;
    }

    .checkmark {
        width: 80px;
        height: 80px;
        background: #28a745; /* green */
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 25px auto;
        font-size: 40px;
        color: white;
    }

    h2 {
        color: #305291;
        margin-bottom: 15px;
    }

    p {
        color: #555;
        margin-bottom: 25px;
        font-size: 15px;
    }

    button {
        padding: 12px 20px;
        background: #305291;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background: #264374;
    }
</style>
</head>
<body>

<div class="success-container">
    <div class="checkmark">✔</div>
    <h2>Login Successful</h2>
    <p>Welcome back! You have successfully logged in.</p>
    <button onclick="window.location.href='login.html'">Go to Dashboard</button>
</div>

</body>
</html>
