<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForceFoodGood | Order Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="p-8">

<header class="mb-8 text-center">
    <div class="mascot-logo">logo here</div>
    <h1 class="text-3xl font-bold text-navy">ForceFoodGood</h1>
</header>

<main class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">

    <section id="cart-section" class="bg-white p-6 rounded-lg shadow-md border-t-4 border-navy">
        <h2 class="text-xl font-bold mb-4">Your Shopping Cart</h2>
        <div id="cart-items" class="space-y-2 mb-4">
            <p class="text-gray-500 italic">Cart is empty...</p>
        </div>

        <div class="border-t pt-4">
            <div class="flex justify-between"><span>Subtotal:</span> <span id="subtotal">$0.00</span></div>
            <div class="flex justify-between"><span>Tax:</span> <span id="tax">$0.00</span></div>
            <div class="flex justify-between font-bold text-lg text-navy">
                <span>Total:</span> <span id="total">$0.00</span>
            </div>
        </div>

        <button id="checkout-btn" class="btn-navy w-full mt-6 py-2 rounded font-semibold">
            Confirm Order
        </button>
    </section>

    <div class="space-y-8">

        <section id="status-section" class="hidden bg-white p-6 rounded-lg shadow-md border-l-4 border-green-500">
            <h2 class="text-xl font-bold mb-2">Order Status</h2>
            <p id="order-id" class="text-sm text-gray-500 mb-2"></p>
            <div class="bg-blue-50 p-3 rounded">
                <p class="font-medium">Status: <span id="order-status" class="text-navy uppercase">Processing</span></p>
                <p class="text-sm" id="delivery-eta">Estimated Delivery: 30-40 mins</p>
            </div>
        </section>

        <section class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-xl font-bold mb-4">Past Orders</h2>
            <ul id="past-orders-list" class="divide-y text-sm">
                <li class="py-2">No history yet.</li>
            </ul>
        </section>

        <section class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-xl font-bold mb-4">Order Summary</h2>
            <ul id="order-summary" class="divide-y text-sm">
                <li class="py-2">Nothing.</li>
            </ul>
        </section>

    </div>
</main>

<script type="module" src="../core/models/orders/OrderLogicModel.js"></script>
</body>
</html>
