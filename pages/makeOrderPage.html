<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForceFoodGood | Order Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

</head>

<body class="p-4">

<header class="mb-4 text-center">
    <div class="mascot-logo">logo here</div>
    <h1 class="fw-bold text-primary">ForceFoodGood</h1>
</header>

<main class="container">

    <div class="row g-4">

        <!-- Cart Section -->
        <div class="col-md-6">
            <section id="cart-section" class="card border-top border-4 border-primary">
                <div class="card-body">

                    <h2 class="h5 fw-bold mb-3">Your Shopping Cart</h2>

                    <div id="cart-items" class="mb-3">
                        <p class="text-muted fst-italic">Cart is empty...</p>
                    </div>

                    <div class="border-top pt-3">

                        <div class="d-flex justify-content-between">
                            <span>Subtotal:</span>
                            <span id="subtotal">$0.00</span>
                        </div>

                        <div class="d-flex justify-content-between">
                            <span>Tax:</span>
                            <span id="tax">$0.00</span>
                        </div>

                        <div class="d-flex justify-content-between fw-bold fs-5">
                            <span>Total:</span>
                            <span id="total">$0.00</span>
                        </div>

                    </div>

                    <button id="checkout-btn" class="btn btn-primary w-100 mt-3">
                        Confirm Order
                    </button>

                </div>
            </section>
        </div>

        <!-- Right Column -->
        <div class="col-md-6">

            <!-- Order Status -->
            <section id="status-section" class="card border-start border-4 border-success mb-4 d-none">

                <div class="card-body">

                    <h2 class="h5 fw-bold">Order Status</h2>

                    <p id="order-id" class="text-muted small"></p>

                    <div class="alert alert-info">

                        <p class="fw-medium">
                            Status:
                            <span id="order-status" class="text-uppercase">Processing</span>
                        </p>

                        <p class="small" id="delivery-eta">
                            Estimated Delivery: 30–40 mins
                        </p>

                    </div>

                </div>
            </section>

            <!-- Past Orders -->
            <section class="card mb-4">
                <div class="card-body">

                    <h2 class="h5 fw-bold mb-3">Past Orders</h2>

                    <ul id="past-orders-list" class="list-group list-group-flush">
                        <li class="list-group-item">No history yet.</li>
                    </ul>

                </div>
            </section>

            <!-- Order Summary -->
            <section class="card">
                <div class="card-body">

                    <h2 class="h5 fw-bold mb-3">Order Summary</h2>

                    <ul id="order-summary" class="list-group list-group-flush">
                        <li class="list-group-item">Nothing.</li>
                    </ul>

                </div>
            </section>

        </div>

    </div>

</main>

<script type="module" src="../core/models/orders/OrderLogicModel.js"></script>

</body>
</html>
