<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Promotion Hierarchy Demo</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
    />

    <style>
        body {
            background-color: #f4f8ff;
            color: #0d3b66;
            font-family: Arial, sans-serif;
        }

        .hero-section {
            background: linear-gradient(135deg, #ffffff, #dcebff);
            border-bottom: 3px solid #0d6efd;
            padding: 50px 20px;
        }

        .card {
            border: none;
            border-radius: 18px;
            box-shadow: 0 6px 18px rgba(13, 110, 253, 0.12);
        }

        .card-header {
            background-color: #0d6efd;
            color: white;
            border-top-left-radius: 18px !important;
            border-top-right-radius: 18px !important;
            font-weight: bold;
        }

        .btn-primary {
            background-color: #0d6efd;
            border: none;
        }

        .result-box {
            background-color: white;
            border-left: 5px solid #0d6efd;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            min-height: 70px;
        }

        .feature-box {
            background-color: white;
            border-radius: 15px;
            padding: 20px;
            height: 100%;
            box-shadow: 0 4px 12px rgba(13, 110, 253, 0.08);
        }

        .section-title {
            color: #0d6efd;
            font-weight: bold;
        }
    </style>
</head>
<body>
<section class="hero-section text-center">
    <div class="container">
        <h1 class="display-5 fw-bold">Promotion Hierarchy Demo</h1>

    </div>
</section>

<main class="container py-5">
    <div class="row g-4">
        <div class="col-lg-7">
            <div class="card">
                <div class="card-header">Try a Promotion</div>
                <div class="card-body p-4">
                    <div class="mb-3">
                        <label for="promotionType" class="form-label">Select Promotion Type</label>
                        <select class="form-select" id="promotionType">
                            <option value="percentage">Percentage Promotion</option>
                            <option value="flat">Flat Promotion</option>
                            <option value="bogo">Buy One Get One</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="inputValue" class="form-label">Discount Value / Quantity</label>
                        <input
                                type="number"
                                class="form-control"
                                id="inputValue"
                                placeholder="Example: 10"
                        />
                    </div>

                    <div class="mb-3">
                        <label for="totalValue" class="form-label">Order Total / Item Price</label>
                        <input
                                type="number"
                                class="form-control"
                                id="totalValue"
                                placeholder="Example: 100"
                        />
                    </div>

                    <button class="btn btn-primary w-100" onclick="applyPromotion()">
                        Apply Promotion
                    </button>

                    <div class="result-box mt-4" id="result">
                        Your result will appear here.
                    </div>
                </div>
            </div>
        </div>


    </div>
</main>

<script src="promotionsDemo.js"></script>
</body>
</html>
