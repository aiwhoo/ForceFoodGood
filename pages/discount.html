<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Discount Strategy Demo | ForceFoodGood</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="styles.css">
</head>

<body class="h-screen flex items-center justify-center">

<div class="container max-w-lg">

<div class="card shadow-xl border-0 rounded-lg p-4 bg-white">

<div class="text-center mb-4">
<div class="mascot-logo mb-2">💸</div>
<h2 class="text-navy font-bold text-2xl">Discount Strategy Demo</h2>
<p class="text-gray-500">Polymorphism in action</p>
</div>

<!-- ADD ITEM -->
<div class="mb-3">
<label class="form-label font-semibold text-navy">Item Name</label>
<input type="text" id="itemName" class="form-control" placeholder="Burger">
</div>

<div class="mb-3">
<label class="form-label font-semibold text-navy">Price</label>
<input type="number" id="itemPrice" class="form-control" placeholder="10">
</div>

<div class="mb-3">
<label class="form-label font-semibold text-navy">Quantity</label>
<input type="number" id="itemQty" class="form-control" value="1">
</div>

<button id="addItemBtn" class="btn btn-navy w-100 mb-4">Add Item</button>

<hr>

<!-- SELECT DISCOUNT -->
<div class="mb-3">
<label class="form-label font-semibold text-navy">Select Discount Type</label>
<select id="discountType" class="form-select">
<option value="percentage">10% Percentage Discount</option>
<option value="flat">$5 Flat Discount</option>
<option value="conditional">Conditional (3+ items = $8 off)</option>
</select>
</div>

<button id="applyDiscountBtn" class="btn btn-navy w-100 mb-3">Apply Discount</button>

<hr>

<!-- OUTPUT -->
<div class="text-center mt-3">

<p class="text-lg">
<strong>Cart Total:</strong>
<span id="cartTotal">$0.00</span>
</p>

<p class="text-lg">
<strong>Discount:</strong>
<span id="discountAmount">$0.00</span>
</p>

<p class="text-lg font-bold">
<strong>Final Total:</strong>
<span id="finalTotal">$0.00</span>
</p>

</div>

</div>
</div>

<script type="module">

import Cart from './cartModel.js'
import { PercentageDiscount, FlatDiscount, ConditionalDiscount } from './discountStrategy.js'

const cart = new Cart()

const itemName = document.getElementById("itemName")
const itemPrice = document.getElementById("itemPrice")
const itemQty = document.getElementById("itemQty")

const cartTotal = document.getElementById("cartTotal")
const discountAmount = document.getElementById("discountAmount")
const finalTotal = document.getElementById("finalTotal")

// ADD ITEM
document.getElementById("addItemBtn").addEventListener("click", () => {

const name = itemName.value
const price = parseFloat(itemPrice.value)
const qty = parseInt(itemQty.value)

cart.addItem(name, price, qty)

updateTotal()

})

// APPLY DISCOUNT
document.getElementById("applyDiscountBtn").addEventListener("click", () => {

let strategy

const type = document.getElementById("discountType").value

// POLYMORPHISM
if(type === "percentage"){
strategy = new PercentageDiscount(10)
}

else if(type === "flat"){
strategy = new FlatDiscount(5)
}

else if(type === "conditional"){
strategy = new ConditionalDiscount(3, 8)
}

const discount = strategy.apply(cart)

const total = parseFloat(cart.calculateTotal())

const final = total - discount

discountAmount.innerText = "$" + discount.toFixed(2)
finalTotal.innerText = "$" + final.toFixed(2)

})

// UPDATE TOTAL
function updateTotal(){
const total = cart.calculateTotal()
cartTotal.innerText = "$" + total
}

</script>

</body>
</html>
