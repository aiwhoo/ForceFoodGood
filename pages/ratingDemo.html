<!DOCTYPE html>
<html>

<head>

    <title>ForceForGood Reviews</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your stylesheet -->
    <link rel="stylesheet" href="styles.css">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-primary">
    <div class="container d-flex align-items-center">

        <img src="https://media.discordapp.net/attachments/1410219694606254143/1481461491420102808/ChatGPT_Image_Mar_11_2026_09_18_57_PM.png?ex=69b40ec7&is=69b2bd47&hm=1c5cf0e118083181b25d55507f6727fd702a29d9955ed51a351bf40fdfe9bbeb&=&format=webp&quality=lossless&width=1412&height=1412"
             alt="Logo"
             class="logo">


        <span class="navbar-brand ms-2">ForceForGood</span>

    </div>
</nav>

<div class="container mt-4">

    <!-- Rating Type -->
    <div class="mb-3">
        <select id="ratingType" class="form-select">
            <option value="restaurant">Restaurant</option>
            <option value="menu">Menu Item</option>
            <option value="driver">Delivery Driver</option>
        </select>
    </div>

    <!-- Main Review Card -->
    <div class="card p-3 mb-4">

        <div class="d-flex align-items-center">

            <img src="https://cdn-icons-png.flaticon.com/512/616/616408.png"
                 class="item-image"
                 alt="Item Image">

            <div class="ms-3">

                <h4 id="itemName">Anish's Cat Cafe</h4>

                <div id="averageRating"></div>

            </div>

        </div>

        <hr>

        <!-- Reviews -->
        <div id="reviewList"></div>

    </div>

    <!-- Add Review -->
    <div class="card p-3">

        <h5>Add Review</h5>

        <input id="stars"
               type="number"
               min="1"
               max="5"
               class="form-control mb-2"
               placeholder="Stars (1‑5)">

        <textarea id="reviewText"
                  class="form-control mb-2"
                  placeholder="Write a review"></textarea>

        <button class="btn btn-primary" onclick="addReview()">
            Submit Review
        </button>

    </div>

</div>

<script type="module" src="ratingDemo.js"></script>

</body>
</html>
