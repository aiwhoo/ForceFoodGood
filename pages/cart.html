<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart Hierarchy Demo</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
    />

    <style>
        body {
            background-color: #f4f8ff;
            color: #0d3b66;
            font-family: Arial, sans-serif;
        }

        .hero-section {
            background: linear-gradient(135deg, #ffffff, #dcebff);
            border-bottom: 3px solid #0d6efd;
            padding: 50px 20px;
        }

        .card {
            border: none;
            border-radius: 18px;
            box-shadow: 0 6px 18px rgba(13, 110, 253, 0.12);
        }

        .card-header {
            background-color: #0d6efd;
            color: white;
            border-top-left-radius: 18px !important;
            border-top-right-radius: 18px !important;
            font-weight: bold;
        }

        .btn-primary {
            background-color: #0d6efd;
            border: none;
        }

        .btn-success {
            border: none;
        }

        .result-box {
            background-color: white;
            border-left: 5px solid #0d6efd;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            min-height: 70px;
        }

        .feature-box {
            background-color: white;
            border-radius: 15px;
            padding: 20px;
            height: 100%;
            box-shadow: 0 4px 12px rgba(13, 110, 253, 0.08);
        }

        .section-title {
            color: #0d6efd;
            font-weight: bold;
        }
    </style>
</head>
<body>
<section class="hero-section text-center">
    <div class="container">
        <h1 class="display-5 fw-bold">Cart Hierarchy Demo</h1>
    </div>
</section>

<main class="container py-5">
    <div class="row g-4">
        <div class="col-lg-7">
            <div class="card">
                <div class="card-header">Try a Cart</div>
                <div class="card-body p-4">

                    <div class="mb-3">
                        <label for="cartType" class="form-label">Select Cart Type</label>
                        <select class="form-select" id="cartType">
                            <option value="customer">Customer Cart</option>
                            <option value="gift">Gift Cart</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="itemName" class="form-label">Item Name</label>
                        <input
                                type="text"
                                class="form-control"
                                id="itemName"
                                placeholder="Example: Burger"
                        />
                    </div>

                    <div class="mb-3">
                        <label for="price" class="form-label">Item Price</label>
                        <input
                                type="number"
                                class="form-control"
                                id="price"
                                placeholder="Example: 5"
                        />
                    </div>

                    <div class="mb-3">
                        <label for="quantity" class="form-label">Quantity</label>
                        <input
                                type="number"
                                class="form-control"
                                id="quantity"
                                value="1"
                                min="1"
                        />
                    </div>

                    <div class="mb-3">
                        <label for="giftMessage" class="form-label">Gift Message (GiftCart only)</label>
                        <input
                                type="text"
                                class="form-control"
                                id="giftMessage"
                                placeholder="Example: Happy Birthday!"
                        />
                    </div>

                    <div class="d-grid gap-2">
                        <button class="btn btn-primary" onclick="addItem()">
                            Add Item
                        </button>

                        <button class="btn btn-success" onclick="checkoutCart()">
                            Checkout
                        </button>
                    </div>

                    <div class="result-box mt-4" id="result">
                        Your result will appear here.
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="feature-box">
                <h3 class="section-title">What This Demonstrates</h3>
                <p><strong>Cart</strong> is the parent class.</p>
                <p><strong>CustomerCart</strong> and <strong>GiftCart</strong> extend Cart.</p>
                <p>Both carts use shared methods like <code>addItem()</code> and <code>calculateTotal()</code>.</p>
                <p>They also use <code>checkout()</code> differently, which demonstrates polymorphism.</p>
            </div>
        </div>
    </div>
</main>

<script type="module">
    import { CustomerCart, GiftCart } from "../core/models/cartModel.js";

    let cart = null;

    function createCart() {
        const type = document.getElementById("cartType").value;
        const giftMessage = document.getElementById("giftMessage").value;

        if (type === "customer") {
            cart = new CustomerCart("Jay");
        } else {
            cart = new GiftCart("Alex", giftMessage);
        }
    }

    window.addItem = function () {
        const type = document.getElementById("cartType").value;
        const itemName = document.getElementById("itemName").value;
        const price = parseFloat(document.getElementById("price").value);
        const quantity = parseInt(document.getElementById("quantity").value);
        const giftMessage = document.getElementById("giftMessage").value;
        const resultBox = document.getElementById("result");

        if (!itemName || isNaN(price) || isNaN(quantity)) {
            resultBox.innerHTML = "Please fill in item name, price, and quantity.";
            return;
        }

        if (!cart) {
            createCart();
        }

        if (type === "gift" && cart instanceof GiftCart) {
            cart.message = giftMessage;
        }

        cart.addItem(itemName, price, quantity);

        resultBox.innerHTML = `
            <strong>Item added!</strong><br>
            Current total: $${cart.calculateTotal()}
        `;
    };

    window.checkoutCart = function () {
        const type = document.getElementById("cartType").value;
        const giftMessage = document.getElementById("giftMessage").value;
        const resultBox = document.getElementById("result");

        if (!cart) {
            createCart();
        }

        if (type === "gift" && cart instanceof GiftCart) {
            cart.message = giftMessage;
        }

        try {
            const result = cart.checkout();
            resultBox.innerHTML = `<strong>${result}</strong>`;
        } catch (error) {
            resultBox.innerHTML = `<strong>Error:</strong> ${error.message}`;
        }
    };
</script>
</body>
</html>
