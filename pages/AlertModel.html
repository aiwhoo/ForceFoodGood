<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlertModel Demo</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSW color scheme -->
    <link rel="stylesheet" href="csw.css">
</head>
<body class="bg-light">

<div class="container py-5">

    <h2 class="mb-4">ForceFoodGood Alert Demo</h2>

    <div class="card p-4 mb-3">
        <div class="mb-3">
            <label for="alertType" class="form-label">Select Alert Type:</label>
            <select id="alertType" class="form-select">
                <option value="OrderAlert">OrderAlert</option>
                <option value="SystemAlert">SystemAlert</option>
                <option value="DriverAlert">DriverAlert</option>
            </select>
        </div>

        <div class="mb-3">
            <label for="alertMessage" class="form-label">Message:</label>
            <input type="text" id="alertMessage" class="form-control" placeholder="Enter alert message">
        </div>

        <div class="mb-3" id="optionalInputDiv">
            <label id="optionalLabel" for="optionalInput" class="form-label">Order / Driver ID:</label>
            <input type="number" id="optionalInput" class="form-control" placeholder="Enter ID (if needed)">
        </div>

        <div id="methodButtons" class="mb-3"></div>
    </div>

    <div class="card p-3">
        <h5>Alert Output:</h5>
        <div id="alertOutput" class="border p-2 bg-white"></div>
    </div>

</div>

<script type="module">
    import { AlertModel, OrderAlert, SystemAlert, DriverAlert } from '../core/models/AlertModel.js';

    const alertTypeSelect = document.getElementById('alertType');
    const alertMessageInput = document.getElementById('alertMessage');
    const optionalInput = document.getElementById('optionalInput');
    const optionalLabel = document.getElementById('optionalLabel');
    const methodButtonsDiv = document.getElementById('methodButtons');
    const outputDiv = document.getElementById('alertOutput');
    const optionalDiv = document.getElementById('optionalInputDiv');

    // Show/hide optional input depending on alert type
    alertTypeSelect.addEventListener('change', updateMethodButtons);

    function updateMethodButtons() {
        methodButtonsDiv.innerHTML = ''; // clear previous buttons
        const type = alertTypeSelect.value;

        if (type === 'OrderAlert') {
            optionalLabel.textContent = 'Order ID:';
            optionalDiv.style.display = 'block';
            ['sendEmail', 'sendPush'].forEach(fn => {
                const btn = document.createElement('button');
                btn.textContent = fn;
                btn.className = 'btn btn-secondary m-1';
                btn.addEventListener('click', () => {
                    const alertInstance = new OrderAlert(alertMessageInput.value, optionalInput.value);
                    outputDiv.textContent = alertInstance[fn]();
                });
                methodButtonsDiv.appendChild(btn);
            });

        } else if (type === 'SystemAlert') {
            optionalDiv.style.display = 'none';
            ['logAlert', 'broadcast'].forEach(fn => {
                const btn = document.createElement('button');
                btn.textContent = fn;
                btn.className = 'btn btn-secondary m-1';
                btn.addEventListener('click', () => {
                    const alertInstance = new SystemAlert(alertMessageInput.value);
                    outputDiv.textContent = alertInstance[fn]();
                });
                methodButtonsDiv.appendChild(btn);
            });

        } else if (type === 'DriverAlert') {
            optionalLabel.textContent = 'Driver ID:';
            optionalDiv.style.display = 'block';
            ['sendSMS', 'markAcknowledged'].forEach(fn => {
                const btn = document.createElement('button');
                btn.textContent = fn;
                btn.className = 'btn btn-secondary m-1';
                btn.addEventListener('click', () => {
                    const alertInstance = new DriverAlert(alertMessageInput.value, optionalInput.value);
                    outputDiv.textContent = alertInstance[fn]();
                });
                methodButtonsDiv.appendChild(btn);
            });
        }
    }

    // Initialize method buttons on page load
    updateMethodButtons();
</script>

</body>
</html>
